[connections.github]
api_key = "${{ env.GITHUB_API_KEY }}"

[connections.todoist]
api_key = "${{ env.TODOIST_API_KEY }}"

[connections.ynab]
# A YNAB Personal Access Token, created from your YNAB account settings.
api_key = "${{ env.YNAB_API_KEY }}"

[connections.alphavantage]
# An AlphaVantage API key, used by the YNAB stocks workflow to fetch stock
# quotes and currency exchange rates. Claim a free key from
# https://www.alphavantage.co/support/#api-key.
api_key = "${{ env.ALPHAVANTAGE_API_KEY }}"

[oauth2.spotify]
name = "Spotify"
jobs = ["workflow/spotify-yearly-playlist"]
client_id = "${{ env.SPOTIFY_CLIENT_ID }}"
client_secret = "${{ env.SPOTIFY_CLIENT_SECRET }}"
auth_url = "https://accounts.spotify.com/authorize"
token_url = "https://accounts.spotify.com/api/token"
scopes = [
    "user-library-read",
    "playlist-modify-public",
    "playlist-modify-private"
]

[web]
address = "127.0.0.1:8080"
# base_url is used to construct absolute URLs (e.g. the OIDC redirect URI). When
# omitted it is inferred from the incoming request's Host header.
# base_url = 'https://automate.example.com'
# trust_proxy controls whether the X-Forwarded-Proto/X-Forwarded-Host headers are
# trusted when determining the request scheme and host. Only enable this when the
# service runs behind a trusted reverse proxy that sets these headers.
# trust_proxy = true

[web.admin]
# The admin area is denied by default; you must provide an `acl` that evaluates to
# true to grant access. The filter can reference `client_ip`, `method`, `path`,
# `headers.*`, and (when OIDC is configured) validated token claims via `claims.*`.
acl = 'client_ip in ["127.0.0.1"]'

[web.admin.oidc]
# Configures support for OIDC authentication on the Admin API, using the provided
# OIDC endpoint (which should not include the .well-known/openid-configuration suffix).
endpoint = 'https://auth.example.com'
client_id = '0000000000000000000000000'
client_secret = '11111111111111111111111111111111111111111111111111'
scopes = ['openid', 'profile', 'email']

[webhooks.azure_monitor]
# filter = 'true'
todoist = { project = "Software", section = "Outages" }

[webhooks.grafana]
# secret = "xxxxxx"  # Optional authorization header value for webhook authentication
# filter = 'true'
todoist = { project = "Software", section = "Outages" }

[webhooks.honeycomb]
trusted_secrets = [
    # "xxxxxx"
]
# filter = 'true'
todoist = { project = "Software", section = "Outages" }

[webhooks.sentry]
# secret = "xxxxxx"
# filter = 'true'
todoist = { project = "Software", section = "Errors" }

[webhooks.tailscale]
# secret = "xxxxxx"
# filter = 'true'
todoist = { project = "Software", section = "Security" }

[webhooks.terraform]
# secret = "xxxxxx"
todoist = { project = "Software", section = "Maintenance" }

[[workflows.calendars]]
name = "Personal"
url = "https://example.com/calendar.ics"
cron = "*/30 * * * *"
priority = 4
todoist = { project = "Life", section = "Plans" }

[[workflows.github_notifications]]
cron = "*/15 * * * *"
todoist = { project = "Hobbies", section = "Open Source" }

[[workflows.github_releases]]
repository = "hashicorp/vault"
cron = "0 */8 * * *"
filter = "!prerelease && !draft"
todoist = { project = "Hobbies", section = "Software" }

[[workflows.rss]]
name = "Citation Needed"
homepage = "https://citationneeded.news/"
url = "https://citationneeded.news/rss/"
cron = "@daily"

[[workflows.rss]]
name = "SRE Weekly"
homepage = "https://sreweekly.com/"
url = "https://sreweekly.com/feed/"
cron = "@daily"

[[workflows.rss]]
name = "Tailscale Releases"
homepage = "https://tailscale.com/changelog/"
url = "https://tailscale.com/changelog/index.xml"
cron = "0 */6 * * *"

[[workflows.rss]]
name = "Word of the Day"
homepage = "https://www.merriam-webster.com/word"
url = "https://www.merriam-webster.com/word/feed/rss2"

[[workflows.youtube]]
name = "Alexander the Ok"
channel_id = "UC9XjwCMWhes6R3jtOzZx50A"

[[workflows.youtube]]
name = "Dakar"
channel_id = "UCJVKwvv58Xo3Rt4rF3NiL9w"
filter = "title contains \"extended highlights\""

[[workflows.youtube]]
name = "Formula 1"
channel_id = "UCB_qr75-ydFVKSF9Dmo6izg"
filter = "title contains \"highlights | \" && !(title contains \"f2 \")"

[[workflows.xkcd]]
cron = "0 8 * * *"

[[workflows.ynab_stocks]]
# The YNAB budget (plan) ID whose stock accounts should be synchronised.
budget = "00000000-0000-0000-0000-000000000000"
cron = "0 */12 * * *"
# Add `/automate:stock` to a YNAB account's note to opt it in, for example:
#   /automate:stock MSFT=100 AAPL=50 cost_basis=USD5000 cgt_rate=40% payee_name="Stock Market"
# Every `key=value` pair other than the reserved keys (cost_basis, cgt_rate,
# payee_name) is treated as a ticker symbol and the quantity held.